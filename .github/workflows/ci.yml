name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: extractions/setup-just@v2

      - name: Lint
        run: just lint

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        rails: ["rails-7-1", "rails-7-2", "rails-8-0"]
        db: [sqlite]
        exclude:
          - ruby: "3.2"
            rails: "rails-8-0"

    env:
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install appraisal dependencies
        run: bundle exec appraisal ${{ matrix.rails }} bundle install

      - name: Run tests
        run: bundle exec appraisal ${{ matrix.rails }} rspec
