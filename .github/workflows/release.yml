name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +'%Y.%-m.%-d.%H%M%S')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          sed -i "s/VERSION = .*/VERSION = \"$VERSION\"/" lib/migration_skippr/version.rb
          cat lib/migration_skippr/version.rb

      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/migration_skippr/version.rb
          git commit -m "release: ${{ steps.version.outputs.tag }}"

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1

      - name: Tag and GitHub Release
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin HEAD:main --tags
          gh release create ${{ steps.version.outputs.tag }} --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
