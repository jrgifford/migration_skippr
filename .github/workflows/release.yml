name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build gem
        run: gem build migration_skippr.gemspec

      - name: Publish to RubyGems
        run: gem push migration_skippr-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} migration_skippr-*.gem --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
