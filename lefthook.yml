pre-commit:
  parallel: true
  commands:
    standard:
      glob: "*.rb"
      run: mise exec -- bundle exec standardrb --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    rspec:
      run: mise exec -- bundle exec rspec
    reek:
      run: mise exec -- bundle exec reek lib/ app/
    flay:
      run: mise exec -- bundle exec flay lib/ app/
    flog:
      run: "mise exec -- bundle exec flog -a lib/ app/ | tail -1 | awk '{if ($1 > 25) {print \"FAIL: flog score \" $1 \" exceeds 25\"; exit 1}}'"
    brakeman:
      run: mise exec -- bundle exec brakeman --path . --no-pager -q --no-exit-on-warn --no-exit-on-error
    bundle-audit:
      run: mise exec -- bundle exec bundle-audit check
